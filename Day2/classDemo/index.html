<html lang="en">

    <!-- STYLE SHEETS USED WHEN DISCUSSING THE CASCADING (TOP TO BOTTOM) NATURE OF WEB TECHNOLOGIES -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <!-- Used by JS to alter page contents. -->
    <p id="bar">hello world</p>

    <p class="test">SPECIFICITY 1</p>
    <p id="demo" class="test2">SPECIFICITY 2</p>

    <span class="cascade">CASCADE ME!</span>
