<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>hello world</p>

    <!-- This parent div was not in the class demo but made it easier to look at. -->
    <div class="leaves">
        <!-- The below leaf examples came from a discussion on leaves in CSS -->
        <!-- The goal was to speed-run some simple leaves as an example. -->
        <div class="leaf"></div>
        <div class="leaf_2"></div>
        
        <!-- The below leaf examples are from me after class. I wanted to add the leaf stems. -->
        <div class="leaf_3"></div>
        <div class="leaf_4"></div>

        <!-- The next two examples came about as a discussion leaf alternatives without CSS...since I (Jake) am no CSS "artist" 😅 -->
        <img src="leaf.png" alt="Speed-ran (poorly drawn) a png of a leaf." width="150px">
        <img src="leaf_better.png" alt="An altered Canadian maple leaf png for demo." width="150px">
        <!-- A slightly-modified version of the svg from class -->
        <!-- Scalable Vector Graphics (SVG) are path-based images that make sizing easy without worrying about pixels.-->
        <img src="example.svg" alt="Example of a simple SVG." width="150px">
        <!-- I decided to make a leaf SVG for fun. :) NOTE: You DO NOT need to know how to make SVGs to be a web dev!!! I learned for fun.-->
        <img src="leaf.svg" alt="Example of a leaf SVG." width="150px">
    </div>
    <script src="app.js"></script>
</body>
</html>
